<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sombra</title>
</head>
<body>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 62.5%;
        }

        div {
            margin: 10rem;
            width: 20rem;
            height: 20rem;
            background-color: green;

            /* deslocamento horizontal, deslocamento vertical, cor */
            box-shadow: 1rem 2rem rgba(0, 0, 0, 0.13);
            
            /* deslocamento horizontal, deslocamento vertical, raio de desfoque, cor */
            box-shadow: 1rem 1rem 2rem rgba(0, 0, 0, 0.13);
            
            /* deslocamento horizontal, deslocamento vertical, raio de propagação, cor */
            box-shadow: 5rem -5rem 0rem 2rem rgba(0, 0, 0, 0.13);
            
            /* deslocamento horizontal, deslocamento vertical, raio de propagação, cor */
            box-shadow: inset -5rem -5rem 1rem -2rem rgba(0, 0, 0, 0.13);
            
            /* adicionando mais de uma sombra  */
            box-shadow:-5rem -5rem 1rem -2rem rgba(0, 0, 0, 0.479),
            5rem 5rem 1rem 2rem rgba(0, 0, 0, 0.658);
        }
        </style>
    <div></div>
</body>
</html>
